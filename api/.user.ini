; Raise PHP upload ceilings for the AAJ API. Commissions upload a stack of
; phone photos per meeting, so the defaults (typically 2M / 8M on shared
; hosts) are too low. These values apply to anything served under /api.
; On cPanel PHP-FPM, .user.ini is picked up after the next FPM reload
; (~5 minutes). If the host ignores .user.ini, set the same values via
; cPanel → Select PHP Version → Options.

upload_max_filesize = 512M
post_max_size = 512M
memory_limit = 512M
max_file_uploads = 50
max_execution_time = 300
max_input_time = 300
