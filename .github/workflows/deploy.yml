name: Build and deploy to oxahost (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ftp-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Build & FTP deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Deploy en 2 phases pour éviter la fenêtre où index.html référence
      # des assets non encore uploadés (cause du bug récurrent "page sans CSS"
      # observé en prod) :
      #   Phase 1 : pousser les assets hashés (index-XXXX.css/js, motion-*, images)
      #   Phase 2 : pousser index.html, .htaccess et le reste (atomic switch)
      - name: Deploy frontend assets first (atomic phase 1)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/assets/
          server-dir: ./assets/
          state-name: .ftp-deploy-assets-state.json
          dangerous-clean-slate: false
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*

      - name: Deploy frontend index.html + root files (atomic phase 2)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ./
          state-name: .ftp-deploy-root-state.json
          dangerous-clean-slate: false
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
            assets/**
            **/assets/**

      - name: Deploy PHP API via FTP(S)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./api/
          server-dir: ./api/
          dangerous-clean-slate: false
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/.env*
            **/config.php
            **/uploads-storage/**
